# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pix_auditoria}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (Basic Auth para dev/teste — substituir por JWT em produção)
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASS:admin}