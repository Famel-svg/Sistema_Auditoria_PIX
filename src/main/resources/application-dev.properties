# Datasource — banco local via docker-compose
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pix_auditoria}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA — mostra SQL no console para facilitar debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Security
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASS:admin}

# Log level — verbose para dev
logging.level.br.com.pixauditoria=DEBUG
logging.level.org.hibernate.SQL=DEBUG