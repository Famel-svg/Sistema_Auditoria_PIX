# Datasource — sem valores default; a ausência da variável causa falha intencional
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA — sem exposição de SQL em produção
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate

# Security
spring.security.user.name=${SECURITY_USER}
spring.security.user.password=${SECURITY_PASS}

# Log level — apenas erros e warnings em produção
logging.level.br.com.pixauditoria=WARN
logging.level.org.hibernate.SQL=WARN