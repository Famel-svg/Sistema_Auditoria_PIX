version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres-pix
    restart: always
    environment:
      POSTGRES_DB: pix_auditoria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: